# ===================================================================
# AI-Sourcing Hub — Docker Compose Topology
# Services: postgres, redis, api, celery_worker, celery_beat, minio, chromadb
# ===================================================================

services:
  # ---- PostgreSQL 16 ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aisourcing
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d aisourcing"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 300 100
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- FastAPI Application ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
      --proxy-headers
    volumes:
      - .:/app
      - static_volume:/app/app/static
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:${DB_PASSWORD}@postgres:5432/aisourcing
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      STORAGE_BACKEND: s3://${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}@minio:9000/aisourcing
      ENVIRONMENT: development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # ---- Celery Worker ----
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.shared.celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=10
      --prefetch-multiplier=1
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:${DB_PASSWORD}@postgres:5432/aisourcing
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      STORAGE_BACKEND: s3://${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}@minio:9000/aisourcing
      ENVIRONMENT: development
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Celery Beat (Scheduler) ----
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.shared.celery_app beat
      --loglevel=info
    volumes:
      - .:/app
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      ENVIRONMENT: development
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- MinIO Object Storage ----
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  # ---- ChromaDB Vector Store ----
  chromadb:
    image: chromadb/chroma:latest
    environment:
      IS_PERSISTENT: TRUE
      PERSIST_DIRECTORY: /chroma/data
      ANONYMIZED_TELEMETRY: FALSE
    volumes:
      - chroma_data:/chroma/data
    ports:
      - "8001:8000"
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_data:
  chroma_data:
  static_volume:
