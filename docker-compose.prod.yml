# ===================================================================
# AI-Sourcing Hub — Production Docker Compose
# ===================================================================
# Production overrides for docker-compose.yml.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Changes from development:
#   - No hot-reload (--reload removed)
#   - Multiple uvicorn workers
#   - Resource limits (CPU/memory)
#   - Healthchecks on all services
#   - Log rotation configured
#   - Restart policy: always
#   - No local volume mounts (use built image)
# ===================================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI Application ─────────────────────────────────────────────
  api:
    restart: always
    # Use the built image (no local volume mount in production)
    # Image built via: docker compose build api
    # Or pre-pulled from registry
    image: aisourcing-hub-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --access-logfile -
      --error-logfile -
    environment:
      ENVIRONMENT: production
      # TLS: Set DATABASE_URL with ?ssl=require for encrypted DB connections
      # DATABASE_URL: postgresql+asyncpg://user:pass@host:5432/db?ssl=require
      # TLS: Use rediss:// scheme for encrypted Redis connections
      # REDIS_URL: rediss://:password@host:6379/0
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # No volumes mounted in production — the image is self-contained

  # ── Celery Worker ──────────────────────────────────────────────────
  celery_worker:
    restart: always
    image: aisourcing-hub-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.shared.celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=10
      --prefetch-multiplier=1
      --without-gossip
      --without-mingle
      --without-heartbeat
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2g
        reservations:
          cpus: "1"
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.shared.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────
  celery_beat:
    restart: always
    image: aisourcing-hub-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A app.shared.celery_app beat
      --loglevel=info
    environment:
      ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── MinIO Object Storage ───────────────────────────────────────────
  minio:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates (mounted from host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Static files (shared with api service)
      - static_volume:/app/static:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot — SSL Certificate Auto-Renewal ────────────────────────
  # Usage (first time): docker compose run --rm certbot certonly --webroot ...
  # Renewal runs automatically every 12 hours via the entrypoint loop.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Celery Flower — Task Monitoring UI ────────────────────────────
  # Access: https://your-domain/flower  (protected by Nginx basic auth)
  # Set FLOWER_BASIC_AUTH=user:password in .env
  flower:
    image: mher/flower:2.0
    command: >
      celery
      --broker=${REDIS_URL}
      flower
      --port=5555
      --basic_auth=${FLOWER_BASIC_AUTH:-admin:changeme}
    environment:
      ENVIRONMENT: production
    depends_on:
      - redis
      - celery_worker
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Grafana — Metrics Dashboards ───────────────────────────────────
  # Access: https://your-domain/grafana  (Nginx proxy)
  # Default login: admin / set via GF_SECURITY_ADMIN_PASSWORD in .env
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - api
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── ChromaDB Vector Store ───────────────────────────────────────────
  chromadb:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Shared Volumes ────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  chroma_data:
    driver: local
  static_volume:
    driver: local
  certbot_webroot:
    driver: local
  grafana_data:
    driver: local
