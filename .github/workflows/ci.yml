# ═══════════════════════════════════════════════════════════════════
# AI-Sourcing Hub — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════
#
# Policy (per the Phase 5 testing brief):
#   - unit                      -> runs automatically on every push
#   - integration + security    -> runs automatically on every pull request
#   - full E2E (Playwright)     -> runs nightly on a schedule, and can be
#                                  triggered manually before a production
#                                  deploy (workflow_dispatch)
#
# Stack:
#   - Backend: Python 3.13, PostgreSQL 16 (service container, PR job only),
#     SQLAlchemy async with asyncpg, pytest
#   - Frontend: Node 20, Vitest
#   - E2E: Playwright + docker-compose.test.yml (Postgres/Redis/MinIO/Celery)
# ═══════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Nightly E2E run — 02:00 UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Manual trigger — e.g. run the full E2E suite right before a production deploy.

env:
  POSTGRES_DB: ci_db
  POSTGRES_USER: ci_user
  POSTGRES_PASSWORD: secure_ci_db_pass_2026!
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  # ═══════════════════════════════════════════════════════════
  # Unit tests — every push. No Postgres service: these are pure-logic
  # tests (currency conversion, JWT, matcher category-extraction, OCR JSON
  # repair, pricing engine, token blacklist) that run against conftest.py's
  # SQLite fixture, plus the frontend's Vitest unit suite.
  # ═══════════════════════════════════════════════════════════
  backend-unit:
    name: "Backend unit tests (Python 3.13)"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install \
            "fastapi>=0.110.0" "uvicorn[standard]>=0.27.0" \
            "sqlalchemy[asyncio]>=2.0.25" "asyncpg>=0.29.0" "alembic>=1.13.0" \
            "redis>=5.0.0" "celery>=5.3.6" \
            "pydantic[email]>=2.5.0" "pydantic-settings>=2.1.0" \
            "python-dotenv>=1.0.0" "pyjwt[crypto]>=2.8.0" "bcrypt>=4.1.0" \
            "passlib[bcrypt]>=1.7.4" "httpx>=0.26.0" "WeasyPrint>=61.0" \
            "jinja2>=3.1.2" "pdf2image>=1.17.0" "pypdf2>=3.0.0" \
            "json-repair>=0.25.0" "boto3>=1.34.0" "python-json-logger>=2.0.7" \
            "sentry-sdk[fastapi]>=2.0.0" "prometheus-client>=0.19.0" \
            "slowapi>=0.1.9" "pillow>=10.2.0" "psycopg2-binary>=2.9.9" \
            aiosqlite
      - name: Install dev/test dependencies
        run: |
          pip install \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.3.0" "coverage>=7.4.0" "fakeredis>=2.20.0" \
            "moto[s3]>=5.0.0" "pypdfium2>=5.0.0"

      - name: Run unit tests (SQLite, no external services)
        env:
          DB_PASSWORD: local_unit_test_pw
          REDIS_PASSWORD: local_unit_test_redis_pw
          JWT_SECRET: hs256_ci_key_64_chars_minimum_for_hs256_algorithm_use_this
          ENVIRONMENT: development
        run: python -m pytest tests/unit/ --timeout=30 -v --tb=short

  frontend-unit:
    name: "Frontend unit tests (Vitest)"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  # ═══════════════════════════════════════════════════════════
  # Integration + security — every pull request. Needs a real Postgres 16
  # container: matcher.py's JSONB `?|` overlap queries, catalog full-text
  # search, native ENUM types, and the raw-SQL admin/stats endpoint are all
  # PostgreSQL-only (see TESTING_FINDINGS.md #2/#5e) and untestable against
  # the unit job's SQLite fixture.
  # ═══════════════════════════════════════════════════════════
  integration-security:
    name: "Integration + security tests (PostgreSQL 16)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install \
            "fastapi>=0.110.0" "uvicorn[standard]>=0.27.0" \
            "sqlalchemy[asyncio]>=2.0.25" "asyncpg>=0.29.0" "alembic>=1.13.0" \
            "redis>=5.0.0" "celery>=5.3.6" \
            "pydantic[email]>=2.5.0" "pydantic-settings>=2.1.0" \
            "python-dotenv>=1.0.0" "pyjwt[crypto]>=2.8.0" "bcrypt>=4.1.0" \
            "passlib[bcrypt]>=1.7.4" "httpx>=0.26.0" "WeasyPrint>=61.0" \
            "jinja2>=3.1.2" "pdf2image>=1.17.0" "pypdf2>=3.0.0" \
            "json-repair>=0.25.0" "boto3>=1.34.0" "python-json-logger>=2.0.7" \
            "sentry-sdk[fastapi]>=2.0.0" "prometheus-client>=0.19.0" \
            "slowapi>=0.1.9" "pillow>=10.2.0" "psycopg2-binary>=2.9.9" \
            aiosqlite
      - name: Install dev/test dependencies
        run: |
          pip install \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.3.0" "coverage>=7.4.0" "fakeredis>=2.20.0" \
            "moto[s3]>=5.0.0" "pypdfium2>=5.0.0"

      - name: Verify application imports
        env:
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ci_redis_strong_pwd_XYZ
          JWT_SECRET: hs256_ci_key_64_chars_minimum_for_hs256_algorithm_use_this
          ENVIRONMENT: development
        run: |
          python -c "
          from app.config import settings;
          from app.main import create_app;
          app = create_app();
          print('Application imports and model compilation successful')
          "

      - name: Run integration + security + legacy API tests against PostgreSQL 16
        env:
          DATABASE_URL: "postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@${{ env.POSTGRES_HOST }}:${{ env.POSTGRES_PORT }}/${{ env.POSTGRES_DB }}"
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ci_redis_strong_pwd_XYZ
          JWT_SECRET: hs256_ci_key_64_chars_minimum_for_hs256_algorithm_use_this
          ENVIRONMENT: development
          ALLOWED_HOSTS: '["*"]'
          CORS_ORIGINS: '["*"]'
          REDIS_URL: "redis://localhost:6379/9"
          MINIO_ENDPOINT: "localhost:9000"
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            pg_isready -h ${{ env.POSTGRES_HOST }} \
                       -p ${{ env.POSTGRES_PORT }} \
                       -U ${{ env.POSTGRES_USER }} \
                       -d ${{ env.POSTGRES_DB }} && break
            sleep 1
          done

          python -m pytest \
            tests/integration/ tests/security/ \
            tests/test_auth/ tests/test_documents/ tests/test_intake/ \
            tests/test_output/ tests/test_pricing/ \
            --timeout=30 -v --tb=short

  # ═══════════════════════════════════════════════════════════
  # Full E2E (Playwright) — nightly schedule, or on-demand right before a
  # production deploy (workflow_dispatch). Never runs on every push/PR: it's
  # the slowest layer (real Postgres/Redis/MinIO/Celery via
  # docker-compose.test.yml, real browser automation).
  # ═══════════════════════════════════════════════════════════
  e2e:
    name: "Full E2E suite (Playwright + docker-compose.test.yml)"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Start the test stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for the API to be healthy
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8001/health && break
            sleep 2
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run the full Playwright suite
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Tear down the test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
