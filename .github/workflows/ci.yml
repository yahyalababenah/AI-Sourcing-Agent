# ═══════════════════════════════════════════════════════════════════
# AI-Sourcing Hub — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════
#
# Triggers:
#   - push / pull_request to main or develop
#
# Stack:
#   - Python 3.13
#   - PostgreSQL 16 (service container)
#   - SQLAlchemy async with asyncpg driver
#   - pytest with timeout
#
# This workflow validates:
#   1. All packages install correctly from pyproject.toml
#   2. All 8 SQLAlchemy models compile (including JSONB columns)
#   3. API integration tests pass against a real PostgreSQL container
#   4. Unit tests for rate_limiter, security_middleware, metrics,
#      ai_cost_tracker pass
# ═══════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  POSTGRES_DB: test_db
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  test:
    name: "Tests (Python 3.13, PostgreSQL 16)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # ── PostgreSQL 16 Service Container ──────────────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python Setup ────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      # ── 3. Install Dependencies ────────────────────────────
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # Install core dependencies from pyproject.toml
          pip install \
            "fastapi>=0.110.0" \
            "uvicorn[standard]>=0.27.0" \
            "sqlalchemy[asyncio]>=2.0.25" \
            "asyncpg>=0.29.0" \
            "alembic>=1.13.0" \
            "redis>=5.0.0" \
            "celery>=5.3.6" \
            "pydantic[email]>=2.5.0" \
            "pydantic-settings>=2.1.0" \
            "python-dotenv>=1.0.0" \
            "pyjwt[crypto]>=2.8.0" \
            "bcrypt>=4.1.0" \
            "passlib[bcrypt]>=1.7.4" \
            "httpx>=0.26.0" \
            "WeasyPrint>=61.0" \
            "jinja2>=3.1.2" \
            "pdf2image>=1.17.0" \
            "pypdf2>=3.0.0" \
            "json-repair>=0.25.0" \
            "boto3>=1.34.0" \
            "python-json-logger>=2.0.7" \
            "sentry-sdk[fastapi]>=2.0.0" \
            "prometheus-client>=0.19.0" \
            "slowapi>=0.1.9" \
            "pillow>=10.2.0" \
            "psycopg2-binary>=2.9.9" \
            aiosqlite
      - name: Install dev/test dependencies
        run: |
          pip install \
            "pytest>=8.0.0" \
            "pytest-asyncio>=0.23.0" \
            "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.3.0" \
            "coverage>=7.4.0"

      # ── 4. Verify imports ──────────────────────────────────
      - name: Verify application imports
        env:
          # Minimal env vars needed to instantiate Settings()
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: test_redis_pwd_XYZ
          JWT_SECRET: test_jwt_key_64_chars_minimum_for_hs256_algorithm_use_this
          ENVIRONMENT: testing
        run: |
          python -c "
          from app.config import settings;
          from app.main import create_app;
          app = create_app();
          print('✓ Application imports and model compilation successful')
          "

      # ── 5. Test Execution ──────────────────────────────────
      - name: Run tests against PostgreSQL 16
        env:
          # Point to the live Postgres service container
          DATABASE_URL: "postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@${{ env.POSTGRES_HOST }}:${{ env.POSTGRES_PORT }}/${{ env.POSTGRES_DB }}"

          # Required by app/config.py Settings validation
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: test_redis_pwd_XYZ
          JWT_SECRET: test_jwt_key_64_chars_minimum_for_hs256_algorithm_use_this

          # Test environment overrides
          ENVIRONMENT: testing
          ALLOWED_HOSTS: '["*"]'
          CORS_ORIGINS: '["*"]'
          REDIS_URL: "redis://localhost:6379/9"
          MINIO_ENDPOINT: "localhost:9000"
        run: |
          # Wait for Postgres to accept connections
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            pg_isready -h ${{ env.POSTGRES_HOST }} \
                       -p ${{ env.POSTGRES_PORT }} \
                       -U ${{ env.POSTGRES_USER }} \
                       -d ${{ env.POSTGRES_DB }} && break
            sleep 1
          done

          # Run the full test suite
          python -m pytest \
            --timeout=30 \
            -v \
            --tb=short \
            -x
