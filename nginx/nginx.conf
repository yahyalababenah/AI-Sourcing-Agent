# ===================================================================
# AI-Sourcing Hub — Nginx Production Configuration
# ===================================================================
# Reverse proxy for FastAPI application.
# Handles SSL termination, HTTP→HTTPS redirect, rate limiting,
# static file serving, and request forwarding.
# ===================================================================

upstream api_servers {
    # Round-robin load balancing across API containers
    # In production, this resolves to the api service in docker-compose
    server api:8000 max_fails=3 fail_timeout=30s;
}

# ── Rate Limiting Zones ──────────────────────────────────────────────
# General API: 100 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# Document upload: 10 requests per minute per IP
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

# LLM endpoints: 30 requests per minute per IP
limit_req_zone $binary_remote_addr zone=llm_limit:10m rate=30r/m;

# ── HTTP → HTTPS Redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name api.aisourcing.example.com;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.aisourcing.example.com;

    # ── SSL Configuration ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.aisourcing.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aisourcing.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (365 days)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Security Headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request Size Limits ─────────────────────────────────────────────
    # Document uploads can be up to 10MB
    client_max_body_size 10M;

    # ── Static Files ────────────────────────────────────────────────────
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Prometheus Metrics (internal only) ──────────────────────────────
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;   # Docker internal network
        deny all;
        proxy_pass http://api_servers;
    }

    # ── Health Check ────────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API Proxy ────────────────────────────────────────────────────────
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy to FastAPI
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Error handling — return 502 if upstream is down
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    # ── Rate-Limited Upload Endpoint ────────────────────────────────────
    location /api/v1/documents/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 10M;

        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    180s;  # Longer timeout for uploads
    }

    # ── Access & Error Logs ─────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/error.log warn;
}
